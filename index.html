<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mirror</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --size: min(78vw, 78vh);
      --ring-color: #c9a96e;
      --bg: #0d0d0d;
      --text: #e8dcc8;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .scene {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      position: absolute;
      width: calc(var(--size) * 1.3);
      height: calc(var(--size) * 1.3);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.18) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.07); opacity: 1; }
    }

    .ring {
      position: absolute;
      width: calc(var(--size) + 18px);
      height: calc(var(--size) + 18px);
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        var(--ring-color) 60deg,
        #f0dfa8 90deg,
        var(--ring-color) 120deg,
        transparent 180deg,
        var(--ring-color) 240deg,
        #f0dfa8 270deg,
        var(--ring-color) 300deg,
        transparent 360deg
      );
      animation: spin 12s linear infinite;
      pointer-events: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .ring::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--bg);
    }

    .mirror-btn {
      position: relative;
      z-index: 2;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 35% 35%, #2a2520, #0d0d0d);
      overflow: hidden;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,0.05),
        inset 0 -4px 12px rgba(0,0,0,0.6),
        0 8px 40px rgba(0,0,0,0.7);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .mirror-btn:active {
      transform: scale(0.97);
    }

    .label-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.6s ease;
      pointer-events: none;
      user-select: none;
    }

    .label-wrap.hidden {
      opacity: 0;
    }

    .label-icon {
      width: 44px;
      height: 44px;
      opacity: 0.75;
    }

    .label-text {
      font-size: clamp(18px, 4.5vw, 26px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.18em;
      color: var(--text);
      text-transform: uppercase;
    }

    .label-sub {
      font-size: clamp(10px, 2.5vw, 13px);
      font-weight: 300;
      letter-spacing: 0.25em;
      color: rgba(232,220,200,0.45);
      text-transform: uppercase;
    }

    #video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      transform: scaleX(-1);
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #video.active {
      opacity: 1;
    }

    .vignette {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, transparent 55%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .vignette.active {
      opacity: 1;
    }

    .mirror-btn::before {
      content: '';
      position: absolute;
      top: 6%;
      left: 12%;
      width: 40%;
      height: 28%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 70%);
      pointer-events: none;
      z-index: 10;
      transform: rotate(-15deg);
    }

    .tagline {
      position: fixed;
      bottom: max(28px, env(safe-area-inset-bottom, 20px));
      left: 0;
      right: 0;
      text-align: center;
      font-size: clamp(9px, 2.2vw, 11px);
      letter-spacing: 0.35em;
      color: rgba(232,220,200,0.2);
      text-transform: uppercase;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      pointer-events: none;
    }

    .error-msg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20%;
      font-size: clamp(11px, 3vw, 14px);
      color: rgba(232,220,200,0.6);
      font-style: italic;
      letter-spacing: 0.05em;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .error-msg.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="scene">
    <div class="glow"></div>
    <div class="ring"></div>

    <button class="mirror-btn" id="btn" aria-label="Activate mirror camera">

      <video id="video" autoplay playsinline muted></video>

      <div class="vignette" id="vignette"></div>

      <div class="label-wrap" id="label">
        <svg class="label-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="22" r="10" stroke="#c9a96e" stroke-width="1.2"/>
          <circle cx="22" cy="22" r="16" stroke="rgba(201,169,110,0.4)" stroke-width="0.8" stroke-dasharray="3 4"/>
          <circle cx="22" cy="22" r="3" fill="#c9a96e" opacity="0.8"/>
          <line x1="22" y1="4"  x2="22" y2="8"  stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="22" y1="36" x2="22" y2="40" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="4"  y1="22" x2="8"  y2="22" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="36" y1="22" x2="40" y2="22" stroke="#c9a96e" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span class="label-text">Mirror</span>
        <span class="label-sub">tap to reflect</span>
      </div>

      <div class="error-msg" id="errorMsg"></div>

    </button>
  </div>

  <p class="tagline">hold still &nbsp;·&nbsp; breathe &nbsp;·&nbsp; observe</p>

  <script>
    const btn      = document.getElementById('btn');
    const video    = document.getElementById('video');
    const label    = document.getElementById('label');
    const vignette = document.getElementById('vignette');
    const errorMsg = document.getElementById('errorMsg');

    let stream = null;
    let active = false;

    async function startMirror() {
      if (active) return;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 1280 } },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        active = true;
        label.classList.add('hidden');
        video.classList.add('active');
        vignette.classList.add('active');
      } catch (err) {
        let msg = 'Camera access was denied. Please allow permissions and try again.';
        if (err.name === 'NotFoundError')    msg = 'No camera found on this device.';
        if (err.name === 'NotSupportedError' || err.name === 'SecurityError')
          msg = 'Camera requires a secure (HTTPS) connection.';
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
        label.classList.add('hidden');
        setTimeout(() => {
          errorMsg.classList.remove('visible');
          label.classList.remove('hidden');
        }, 3200);
      }
    }

    function stopMirror() {
      if (!active) return;
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      video.classList.remove('active');
      vignette.classList.remove('active');
      label.classList.remove('hidden');
      active = false;
    }

    btn.addEventListener('click', () => active ? stopMirror() : startMirror());
  </script>

</body>
</html>
